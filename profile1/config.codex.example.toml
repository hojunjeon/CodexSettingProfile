# install-profile1.ps1 upserts these portable settings into %USERPROFILE%\.codex\config.toml.
# Do not copy machine-specific hook trust hashes, Desktop runtime paths, keyrings, or tokens.

model = "gpt-5.5"
model_reasoning_effort = "xhigh"
approval_policy = "never"
sandbox_mode = "danger-full-access"
network_access = "enabled"
service_tier = "default"

[features]
goals = true
unified_exec = true
child_agents_md = true
multi_agent = true
plugin_hooks = true
plugins = true
memories = true

[desktop]
integratedTerminalShell = "gitBash"
conversationDetailMode = "STEPS_COMMANDS"
show-context-window-usage = true

[features.multi_agent_v2]
enabled = false
max_concurrent_threads_per_session = 1000

[plugins."omo@sisyphuslabs"]
enabled = true

[plugins."omo@sisyphuslabs".mcp_servers.context7]
enabled = true

[plugins."omo@sisyphuslabs".mcp_servers.codegraph]
enabled = true

[plugins."omo@sisyphuslabs".mcp_servers.git_bash]
enabled = true

[plugins."trihead-optimizer@personal"]
enabled = true

[plugins."ponytail@ponytail"]
enabled = true

[agents]
max_threads = 1000
